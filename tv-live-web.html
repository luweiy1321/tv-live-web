<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width">
<title>TV Live</title>
<script src="https://cdn.jsdelivr.net/npm/hls.js@1.4.0"></script>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:-apple-system,sans-serif; background:#0f0f1a; color:#fff; height:100vh; overflow:hidden; }
.container { display:flex; height:100vh; }
.sidebar { width:320px; background:linear-gradient(180deg,#1a1a2e,#16213e); display:flex; flex-direction:column; border-right:1px solid #333; }
.sidebar-header { padding:20px; background:linear-gradient(90deg,#0f3460,#533483); text-align:center; }
.sidebar-header h1 { font-size:22px; }
.stats { font-size:12px; opacity:0.8; margin-top:5px; }
.search { padding:12px; background:rgba(0,0,0,0.3); }
.search input { width:100%; padding:10px; background:rgba(255,255,255,0.1); border:1px solid rgba(255,255,255,0.2); border-radius:20px; color:#fff; font-size:14px; }
.cat-label { padding:10px 15px 5px; font-size:12px; color:#00d4ff; font-weight:600; }
.cats { display:flex; gap:6px; padding:0 15px 8px; overflow-x:auto; }
.cat { background:rgba(255,255,255,0.1); border:none; color:#fff; padding:6px 14px; border-radius:15px; font-size:12px; cursor:pointer; }
.cat.active { background:#00d4ff; color:#000; }
.channel-list { flex:1; overflow-y:auto; padding:8px 15px; }
.channel-item { padding:12px; background:rgba(255,255,255,0.05); border-radius:8px; margin-bottom:6px; cursor:pointer; font-size:13px; }
.channel-item:hover { background:rgba(0,212,255,0.15); }
.main { flex:1; display:flex; flex-direction:column; background:#000; }
.player-top { padding:15px; background:rgba(0,0,0,0.8); font-size:16px; }
.player-main { flex:1; display:flex; align-items:center; justify-content:center; padding:20px; }
#videoContainer { width:100%; max-width:1200px; aspect-ratio:16/9; background:#000; border-radius:10px; }
video { width:100%; height:100%; }
.player-bottom { padding:15px; background:rgba(0,0,0,0.8); display:flex; justify-content:center; gap:15px; }
.player-bottom button { background:rgba(255,255,255,0.1); border:1px solid rgba(255,255,255,0.2); color:#fff; padding:10px 25px; border-radius:20px; cursor:pointer; }
.toast { position:fixed; bottom:30px; left:50%; transform:translateX(-50%); background:#00d4ff; color:#000; padding:12px 25px; border-radius:25px; font-weight:bold; display:none; z-index:1000; }
.toast.show { display:block; }
@media (max-width:768px) { .container { flex-direction:column; } .sidebar { width:100%; height:45%; } .main { height:55%; } }
</style>
</head>
<body>
<div class="container">
<div class="sidebar">
<div class="sidebar-header">
<h1>TV Live</h1>
<div class="stats" id="stats">加载中...</div>
</div>
<div class="search"><input type="text" id="search" placeholder="搜索..." onkeyup="doSearch()"></div>
<div class="cat-label">央视</div>
<div class="cats">
<button class="cat active" id="btn-all" onclick="selectCat('all')">全部</button>
<button class="cat" id="btn-cctv" onclick="selectCat('cctv')">央视</button>
<button class="cat" id="btn-weishi" onclick="selectCat('weishi')">卫视</button>
<button class="cat" id="btn-difang" onclick="selectCat('difang')">地方台</button>
</div>
<div class="cat-label">港澳台</div>
<div class="cats">
<button class="cat" id="btn-hk" onclick="selectCat('hk')">香港</button>
<button class="cat" id="btn-tw" onclick="selectCat('tw')">台湾</button>
</div>
<div class="cat-label">其他</div>
<div class="cats">
<button class="cat" id="btn-news" onclick="selectCat('news')">新闻</button>
<button class="cat" id="btn-sports" onclick="selectCat('sports')">体育</button>
<button class="cat" id="btn-movie" onclick="selectCat('movie')">电影</button>
</div>
<div class="channel-list" id="list"></div>
</div>
<div class="main">
<div class="player-top" id="playerTitle">选择频道</div>
<div class="player-main"><div id="videoContainer"><video id="video" controls></video></div></div>
<div class="player-bottom">
<button onclick="stopPlay()">停止</button>
<button onclick="closePlayer()">关闭</button>
</div>
</div>
</div>
<div class="toast" id="toast"></div>
<script>
var channels = [];
var currentCat = 'all';
var video = document.getElementById('video');
var hls = null;

// 多个源的频道
var multiSources = {
'CCTV-1': [
'https://ldncctvwbcdbd.a.bdydns.com/ldncctvwbcd/cdrmldcctv1_1/index.m3u8?BR=td',
'http://140.207.241.2:8080/live/program/live/cctv1hd/4000000/mnf.m3u8',
'http://121.24.98.226:8090/hls/9/index.m3u8',
'http://ottrrs.hl.chinamobile.com/PLTV/88888888/224/3221226016/index.m3u8',
'http://111.13.111.242/otttv.bj.chinamobile.com/PLTV/88888888/224/3221226226/1.m3u8',
'http://39.134.24.162/dbiptv.sn.chinamobile.com/PLTV/88888890/224/3221225804/index.m3u8',
'http://183.63.15.42:9901/tsfile/live/0001_1.m3u8',
'https://node1.olelive.com:6443/live/CCTV1HD/hls.m3u8',
'http://39.135.138.58:18890/PLTV/88888888/224/3221225618/index.m3u8',
'http://39.134.65.175/PLTV/88888888/224/3221225816/index.m3u8',
'http://ott.mobaibox.com/PLTV/3/224/3221227896/index.m3u8',
'http://223.110.241.130:6610/gitv/live1/G_CCTV-1-HQ/.m3u8'
],
'CCTV-2': [
'https://ldocctvwbcdks.v.kcdnvip.com/ldocctvwbcd/cdrmldcctv2_1/index.m3u8?BR=td&region=beijing',
'http://140.207.241.2:8080/live/program/live/cctv2/1300000/mnf.m3u8'
],
'CCTV-5': [
'http://140.207.241.2:8080/live/program/live/cctv5hd/4000000/mnf.m3u8',
'http://121.24.98.226:8090/hls/38/index.m3u8'
],
'CCTV-6': [
'http://140.207.241.2:8080/live/program/live/cctv6/1300000/mnf.m3u8'
],
'CCTV-13': [
'https://ldncctvwbcdbd.a.bdydns.com/ldncctvwbcd/cdrmldcctv13_1/index.m3u8?BR=td',
'http://140.207.241.2:8080/live/program/live/cctvxw/1300000/mnf.m3u8'
]
};

var filters = {
'all': function(c) { return true; },
'cctv': function(c) { return c.n.indexOf('CCTV') > -1 || c.n.indexOf('央视') > -1; },
'weishi': function(c) { return c.n.indexOf('卫视') > -1; },
'difang': function(c) { return c.n.indexOf('卫视') === -1 && (c.n.indexOf('台') > -1); },
'hk': function(c) { return c.n.indexOf('TVB') > -1 || c.n.indexOf('凤凰') > -1 || c.n.indexOf('香港') > -1; },
'tw': function(c) { return c.n.indexOf('台湾') > -1 || c.n.indexOf('中天') > -1 || c.n.indexOf('TVBS') > -1; },
'news': function(c) { return c.n.indexOf('新闻') > -1; },
'sports': function(c) { return c.n.indexOf('体育') > -1; },
'movie': function(c) { return c.n.indexOf('电影') > -1; }
};

function loadChina() {
return new Promise(function(resolve) {
var xhr = new XMLHttpRequest();
xhr.open('GET', 'https://raw.githubusercontent.com/imDazui/Tvlist-awesome-m3u-m3u8/master/m3u/CCTV+卫视-上海联通源.m3u', true);
xhr.onload = function() {
if (xhr.status === 200) {
var lines = xhr.responseText.split('\n');
var name = '';
for (var i = 0; i < lines.length; i++) {
if (lines[i].indexOf('#EXTINF:') === 0) {
var m = lines[i].match(/,(.+)$/);
name = m ? m[1].trim() : '';
} else if (lines[i].indexOf('http') === 0 && name) {
channels.push({n: name, u: lines[i]});
name = '';
}
}
}
resolve();
};
xhr.onerror = function() { resolve(); };
xhr.send();
});
}

function loadGlobal() {
return new Promise(function(resolve) {
var xhr = new XMLHttpRequest();
xhr.open('GET', 'https://iptv-org.github.io/iptv/index.m3u', true);
xhr.onload = function() {
if (xhr.status === 200) {
var lines = xhr.responseText.split('\n');
var name = '';
for (var i = 0; i < lines.length; i++) {
if (lines[i].indexOf('#EXTINF:') === 0) {
var m = lines[i].match(/tvg-name="([^"]*)"/);
name = m ? m[1] : (lines[i].indexOf(',') > 0 ? lines[i].split(',')[1] : '');
} else if (lines[i].indexOf('http') === 0 && name) {
channels.push({n: name.trim(), u: lines[i]});
name = '';
}
}
resolve();
} else { resolve(); }
};
xhr.onerror = function() { resolve(); };
xhr.send();
});
}

document.getElementById('stats').innerText = '加载频道...';
loadChina().then(function(){loadGlobal().then(function(){
document.getElementById('stats').innerText = channels.length + ' 频道';
renderList();
});});

function selectCat(cat) {
currentCat = cat;
var btns = document.getElementsByClassName('cat');
for (var i = 0; i < btns.length; i++) btns[i].classList.remove('active');
document.getElementById('btn-' + cat).classList.add('active');
renderList();
}

function renderList() {
var filterFunc = filters[currentCat] || filters['all'];
var list = [];
for (var i = 0; i < channels.length; i++) {
if (filterFunc(channels[i])) list.push(channels[i]);
}
list = list.slice(0, 100);
var html = '';
for (var j = 0; j < list.length; j++) {
var ch = list[j];
html += '<div class="channel-item" data-name="' + ch.n + '" data-url="' + ch.u + '">' + ch.n + '</div>';
}
document.getElementById('list').innerHTML = html;
var items = document.getElementsByClassName('channel-item');
for (var k = 0; k < items.length; k++) {
items[k].onclick = function() {
doPlay(this.getAttribute('data-name'), this.getAttribute('data-url'));
};
}
}

function doSearch() {
var q = document.getElementById('search').value.toLowerCase();
if (!q) { renderList(); return; }
var list = [];
for (var i = 0; i < channels.length; i++) {
if (channels[i].n.toLowerCase().indexOf(q) > -1) list.push(channels[i]);
}
list = list.slice(0, 50);
var html = '';
for (var j = 0; j < list.length; j++) {
var ch = list[j];
html += '<div class="channel-item" data-name="' + ch.n + '" data-url="' + ch.u + '">' + ch.n + '</div>';
}
document.getElementById('list').innerHTML = html;
var items = document.getElementsByClassName('channel-item');
for (var k = 0; k < items.length; k++) {
items[k].onclick = function() {
doPlay(this.getAttribute('data-name'), this.getAttribute('data-url'));
};
}
}

function doPlay(name, url) {
document.getElementById('playerTitle').innerText = name;
show(name);
if (hls) { hls.destroy(); hls = null; }

// 检查是否有多个源
var sources = multiSources[name];
if (sources) {
tryNextSource(name, sources, 0);
} else {
playUrl(url);
}
}

function tryNextSource(name, urls, index) {
if (index >= urls.length) {
show('所有源都失败');
return;
}
if (Hls.isSupported()) {
hls = new Hls();
hls.loadSource(urls[index]);
hls.attachMedia(video);
hls.on(Hls.Events.MANIFEST_PARSED, function() { 
video.play();
});
hls.on(Hls.Events.ERROR, function(e, d) {
tryNextSource(name, urls, index + 1);
});
} else if (video.canPlayType('application/vnd.apple.mpegurl')) {
video.src = urls[index];
video.play();
} else {
tryNextSource(name, urls, index + 1);
}
}

function playUrl(url) {
if (Hls.isSupported()) {
hls = new Hls();
hls.loadSource(url);
hls.attachMedia(video);
hls.on(Hls.Events.MANIFEST_PARSED, function() { video.play(); });
hls.on(Hls.Events.ERROR, function(e, d) { show('错误: ' + d.type); });
} else if (video.canPlayType('application/vnd.apple.mpegurl')) {
video.src = url;
video.play();
} else { show('不支持'); }
}

function stopPlay() { if (hls) { hls.destroy(); hls = null; } video.pause(); video.currentTime = 0; }
function closePlayer() { stopPlay(); document.getElementById('playerTitle').innerText = '选择频道'; }
function show(t) { var toast = document.getElementById('toast'); toast.innerText = t; toast.classList.add('show'); setTimeout(function() { toast.classList.remove('show'); }, 2500); }
</script>
</body>
</html>
